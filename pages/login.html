<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RefugeeCare IoT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <section class="login-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 col-11">
                    <div class="login-card">
                        <div class="text-center mb-4">
                            <i class="fas fa-heart-pulse login-icon"></i>
                            <h2 class="fw-bold">RefugeeCare IoT</h2>
                            <p class="text-muted">Healthcare Access Portal</p>
                        </div>

                        <ul class="nav nav-tabs mb-4 justify-content-center">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginTab">
                                    <i class="fas fa-sign-in-alt me-1"></i> Login
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#registerTab">
                                    <i class="fas fa-user-plus me-1"></i> Register
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <!-- Login Tab -->
                            <div class="tab-pane fade show active" id="loginTab">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Username</label>
                                        <input type="text" class="form-control" id="loginUsername" 
                                               placeholder="Enter username" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Password</label>
                                        <input type="password" class="form-control" id="loginPassword" 
                                               placeholder="Enter password" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Login As</label>
                                        <select class="form-select" id="loginRole">
                                            <option value="patient">Patient</option>
                                            <option value="healthcare_worker">Healthcare Worker</option>
                                            <option value="admin">Administrator</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary-custom w-100 py-2">
                                        <i class="fas fa-arrow-right me-2"></i>Login
                                    </button>
                                    <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
                                </form>
                                
                                <div class="mt-3 p-3 bg-light rounded">
                                    <small class="text-muted">
                                        <strong>Test Credentials:</strong><br>
                                        👤 Admin: <code>admin</code> / <code>admin123</code><br>
                                        👤 Worker: <code>worker1</code> / <code>worker123</code><br>
                                        👤 Patient: <code>patient1</code> / <code>patient123</code>
                                    </small>
                                </div>
                            </div>

                            <!-- Register Tab -->
                            <div class="tab-pane fade" id="registerTab">
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Full Name</label>
                                        <input type="text" class="form-control" id="regName" 
                                               placeholder="Enter full name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Age</label>
                                        <input type="number" class="form-control" id="regAge" 
                                               placeholder="Enter age">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Gender</label>
                                        <select class="form-select" id="regGender">
                                            <option value="">Select</option>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Phone</label>
                                        <input type="text" class="form-control" id="regPhone" 
                                               placeholder="Enter phone number">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Bed Number</label>
                                        <input type="text" class="form-control" id="regBed" 
                                               placeholder="Enter bed number" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Camp</label>
                                        <select class="form-select" id="regCamp" required>
                                            <option value="">Select camp</option>
                                            <option value="Meheba">Meheba</option>
                                            <option value="Mantapala">Mantapala</option>
                                            <option value="Mayukwayukwa">Mayukwayukwa</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 py-2">
                                        <i class="fas fa-user-plus me-2"></i>Register
                                    </button>
                                    <div id="registerError" class="alert alert-danger mt-3 d-none"></div>
                                    <div id="registerSuccess" class="alert alert-success mt-3 d-none"></div>
                                </form>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <a href="../index.html" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i> Back Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Login
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                const role = document.getElementById('loginRole').value;
                
                const errorDiv = document.getElementById('loginError');
                errorDiv.classList.add('d-none');
                
                try {
                    await login(username, password, role);
                } catch (error) {
                    errorDiv.textContent = error.message || 'Login failed. Check credentials.';
                    errorDiv.classList.remove('d-none');
                }
            });

            // Register
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const data = {
                    full_name: document.getElementById('regName').value.trim(),
                    age: document.getElementById('regAge').value,
                    gender: document.getElementById('regGender').value,
                    phone: document.getElementById('regPhone').value.trim(),
                    bed_number: document.getElementById('regBed').value.trim(),
                    camp: document.getElementById('regCamp').value
                };
                
                const errorDiv = document.getElementById('registerError');
                const successDiv = document.getElementById('registerSuccess');
                errorDiv.classList.add('d-none');
                successDiv.classList.add('d-none');
                
                try {
                    const result = await registerPatient(data);
                    successDiv.innerHTML = `✅ Registered!<br>Username: ${result.username}<br>Password: ${result.password}`;
                    successDiv.classList.remove('d-none');
                    this.reset();
                } catch (error) {
                    errorDiv.textContent = error.message || 'Registration failed.';
                    errorDiv.classList.remove('d-none');
                }
            });
        });
    </script>
</body>
</html>
